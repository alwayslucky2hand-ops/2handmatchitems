<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的上架物件 | 二手好麻吉</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .camera-frame::before, .camera-frame::after { content: ''; position: absolute; width: 30px; height: 30px; border-color: #14b8a6; border-style: solid; z-index: 10; }
    .camera-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
    .camera-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-20">

  <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

  <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-slate-100">
    <div class="max-w-4xl mx-auto px-5 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-teal-700 text-white w-8 h-8 flex items-center justify-center rounded-md font-bold text-sm tracking-widest shadow-sm">友善</div>
        <div>
          <h1 class="text-sm font-bold text-slate-800 tracking-wide">二手好麻吉</h1>
          <p class="text-[10px] text-teal-600 font-medium tracking-widest uppercase">Seller Center</p>
        </div>
      </div>
      <div class="text-xs font-bold text-teal-800" id="current-user-info"></div>
    </div>
  </header>

  <main class="w-full max-w-4xl mx-auto p-4 pt-8">
    <div class="flex justify-between items-end mb-8 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-slate-800 tracking-wider">我的上架物件</h2>
      </div>
      <button onclick="startListingFlow()" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-sm font-bold shadow-md transition duration-300 tracking-widest flex items-center">
        <i class="fa-solid fa-camera-retro mr-2"></i> 我要上架
      </button>
    </div>
    <div id="items-container" class="space-y-4"></div>
  </main>

  <div id="listing-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
    <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden" id="listing-modal-content">
      
      <div class="bg-slate-800 p-4 text-white flex justify-between items-center relative z-20">
        <h3 class="text-sm font-bold tracking-widest"><i class="fa-solid fa-camera-retro text-teal-400 mr-2"></i>AI 智慧引導拍照上架</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>

      <div class="p-6 max-h-[80vh] overflow-y-auto">
        <div id="step-camera" class="space-y-4">
          <p class="text-xs text-teal-700 bg-teal-50 p-3 rounded-xl font-bold">請確保光線充足，不支援相簿上傳以確保真實性。</p>
          
          <div class="w-full h-72 bg-black rounded-xl overflow-hidden relative camera-frame p-2 flex items-center justify-center">
            <video id="camera-stream" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            <canvas id="camera-canvas" class="hidden"></canvas>
            <div class="z-10 absolute bottom-4 text-center w-full">
              <h4 id="cam-angle-text" class="text-white text-2xl font-bold tracking-widest drop-shadow-lg">上方</h4>
            </div>
          </div>
          
          <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
            <div class="flex space-x-1.5" id="cam-progress"></div>
            <button id="btn-take-photo" onclick="takeRealPhoto()" class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-full text-sm font-bold shadow-md tracking-widest flex items-center">
              <i class="fa-solid fa-camera mr-2"></i> 拍下此視角
            </button>
          </div>
        </div>

        <div id="step-form" class="hidden space-y-6">
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
            <h4 class="text-xs font-bold text-teal-700 mb-3 border-b pb-2">AI 辨識結果</h4>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="block text-[10px] text-slate-500">物件類別</label><input type="text" id="form-cat" class="w-full p-2 border rounded-lg text-sm font-bold"></div>
              <div><label class="block text-[10px] text-slate-500">物件項目</label><input type="text" id="form-item" class="w-full p-2 border rounded-lg text-sm font-bold"></div>
              <div class="col-span-2"><label class="block text-[10px] text-slate-500">物件名稱</label><input type="text" id="form-name" class="w-full p-2 border rounded-lg text-sm font-bold"></div>
              <div class="col-span-2 flex gap-2">
                <input type="number" id="form-w" placeholder="寬(cm)" class="w-1/3 p-2 border rounded-lg text-center font-mono">
                <input type="number" id="form-d" placeholder="深(cm)" class="w-1/3 p-2 border rounded-lg text-center font-mono">
                <input type="number" id="form-h" placeholder="高(cm)" class="w-1/3 p-2 border rounded-lg text-center font-mono">
              </div>
            </div>
          </div>

          <div>
            <h4 class="text-xs font-bold text-slate-600 mb-2">賣家與所在地</h4>
            <div class="mb-3">
              <label class="block text-[10px] text-slate-500">賣家會員代碼 (系統自動帶入)</label>
              <input type="text" id="form-member-code" readonly class="w-full p-2 bg-slate-100 border rounded-lg text-sm font-mono text-slate-500 cursor-not-allowed">
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
              <div><input type="text" id="loc-city" placeholder="縣市" value="台北市" class="w-full p-2 border rounded-lg text-sm"></div>
              <div><input type="text" id="loc-dist" placeholder="鄉鎮區" value="信義區" class="w-full p-2 border rounded-lg text-sm"></div>
              <div class="col-span-2"><input type="text" id="loc-road" placeholder="路段" value="信義路五段" class="w-full p-2 border rounded-lg text-sm"></div>
              <div><input type="text" id="loc-no" placeholder="號碼" value="7號" class="w-full p-2 border rounded-lg text-sm"></div>
              <div><input type="number" id="loc-floor" placeholder="樓層" value="1" class="w-full p-2 border rounded-lg text-sm"></div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-[10px] text-rose-500 font-bold mb-1">釋出死線</label><input type="date" id="form-deadline" class="w-full p-2 border rounded-lg"></div>
            <div><label class="block text-[10px] text-teal-600 font-bold mb-1">建議售價 (100倍數)</label><input type="number" id="form-price" step="100" value="800" class="w-full p-2 border rounded-lg font-mono font-bold"></div>
          </div>

          <button id="btn-submit" onclick="submitForm()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold tracking-widest">發佈上架</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 🔗 核心設定：請填寫你的 GAS 網頁應用程式 URL
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwtBHLxEmAolz6TxMJw43fUmugQokKA6RncGXf9W3A0dUFx5XI2YSZOPsAOR7PFw1NW-g/exec";

    // 模擬已登入的使用者資訊
    const currentUser = { email: "alwayslucky2hand@gmail.com", memberCode: "alwayslucky2hand" };
    document.getElementById('current-user-info').innerText = currentUser.email;

    let items = [];
    const angles = ['上方', '下方', '左側', '右側', '前方', '後方', '合照'];
    let currentAngleIndex = 0;
    let mockUploadedPhotos = [];
    let videoStream = null;

    // ==========================================
    // 🚀 使用 Fetch API 取代 google.script.run
    // ==========================================
    async function callBackendAPI(action, data) {
      if (!GAS_API_URL || GAS_API_URL.includes("請把剛剛部署")) {
        alert("開發者提示：請先在 index.html 的原始碼中填寫 GAS_API_URL！");
        throw new Error("Missing GAS_API_URL");
      }
      
      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          // 為了繞過 GAS 嚴格的 CORS 限制，這裡使用 text/plain 發送 JSON 字串
          body: JSON.stringify({ action, data })
        });
        const result = await response.json();
        return result;
      } catch (err) {
        console.error("API Error:", err);
        throw err;
      }
    }

    function showToast(msg, type = 'info') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `px-5 py-3 rounded-xl shadow-xl transition-all font-bold text-sm text-white ${type==='success'?'bg-teal-600':type==='error'?'bg-rose-600':'bg-slate-800'}`;
      t.innerText = msg; c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function initCamera() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('camera-stream').srcObject = videoStream;
      } catch (err) {
        showToast("無法開啟相機，請允許瀏覽器存取相機權限", "error");
      }
    }

    function stopCamera() {
      if (videoStream) videoStream.getTracks().forEach(track => track.stop());
    }

    function startListingFlow() {
      currentAngleIndex = 0; mockUploadedPhotos = [];
      document.getElementById('form-member-code').value = currentUser.memberCode;
      document.getElementById('cam-angle-text').innerText = angles[0];
      
      document.getElementById('step-camera').classList.remove('hidden');
      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('listing-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('listing-modal').classList.remove('opacity-0'), 10);
      
      initCamera();
    }

    function closeModal() {
      document.getElementById('listing-modal').classList.add('opacity-0');
      setTimeout(() => document.getElementById('listing-modal').classList.add('hidden'), 300);
      stopCamera();
    }

    async function takeRealPhoto() {
      const video = document.getElementById('camera-stream');
      const canvas = document.getElementById('camera-canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      const b64 = canvas.toDataURL('image/jpeg', 0.6); // 稍微壓縮確保傳輸速度
      mockUploadedPhotos.push(b64);

      if(currentAngleIndex < angles.length - 1) {
        currentAngleIndex++;
        document.getElementById('cam-angle-text').innerText = angles[currentAngleIndex];
        showToast("已拍攝，請換下一個角度", "success");
      } else {
        stopCamera();
        const btn = document.getElementById('btn-take-photo');
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>呼叫 Gemini AI 分析中...`;
        btn.disabled = true;

        try {
          // 👉 透過 Fetch 呼叫 GitHub 版 API
          const res = await callBackendAPI('analyzeImages', { photos: mockUploadedPhotos });
          if (res.status === 'success') {
            document.getElementById('form-cat').value = res.data.category || '';
            document.getElementById('form-item').value = res.data.itemType || '';
            document.getElementById('form-name').value = res.data.name || '';
            document.getElementById('form-w').value = res.data.width || '';
            document.getElementById('form-d').value = res.data.depth || '';
            document.getElementById('form-h').value = res.data.height || '';
            showToast("AI 辨識完成！", "success");
            
            document.getElementById('step-camera').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
          } else {
            showToast(res.message, "error");
          }
        } catch (e) {
          showToast("連線異常，請手動填寫", "error");
          document.getElementById('step-camera').classList.add('hidden');
          document.getElementById('step-form').classList.remove('hidden');
        }
        btn.innerHTML = "拍下此視角"; btn.disabled = false;
      }
    }

    async function submitForm() {
      const btn = document.getElementById('btn-submit');
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 上傳資料庫中...`; btn.disabled = true;

      const newItem = {
        id: `ITM-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`,
        sellerEmail: currentUser.email,
        sellerMemberCode: currentUser.memberCode,
        name: document.getElementById('form-name').value,
        category: document.getElementById('form-cat').value,
        itemType: document.getElementById('form-item').value,
        width: document.getElementById('form-w').value,
        depth: document.getElementById('form-d').value,
        height: document.getElementById('form-h').value,
        price: document.getElementById('form-price').value,
        photosBase64: mockUploadedPhotos
      };

      try { 
        // 👉 透過 Fetch 呼叫 GitHub 版 API
        await callBackendAPI('saveListing', newItem); 
        showToast("上架成功！照片已自動儲存", "success");
        closeModal();
      } catch (err) { 
        showToast("寫入異常，請檢查網路狀態", "error"); 
      } finally { 
        btn.innerHTML = "發佈上架"; btn.disabled = false; 
      }
    }
  </script>
</body>
</html>
