<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>交易中心 | 二手好麻吉</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; } 
    .camera-frame::before, .camera-frame::after { content: ''; position: absolute; width: 30px; height: 30px; border-color: #14b8a6; border-style: solid; z-index: 10; }
    .camera-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
    .camera-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-24">

  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none w-[90%] max-w-sm"></div>

  <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-slate-100">
    <div class="max-w-4xl mx-auto px-5 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-teal-700 text-white w-8 h-8 flex items-center justify-center rounded-md font-bold text-sm tracking-widest">友善</div>
        <div>
          <h1 class="text-sm font-bold text-slate-800 tracking-wide">二手好麻吉</h1>
          <p class="text-[10px] text-teal-600 font-medium tracking-widest uppercase">交易中心</p>
        </div>
      </div>
      <div class="text-xs font-bold text-teal-800 bg-teal-50 px-3 py-1.5 rounded-full" id="current-user-info"></div>
    </div>
  </header>

  <main class="w-full max-w-4xl mx-auto p-4 pt-6">
    <div class="flex bg-slate-200/50 p-1 rounded-xl mb-6 shadow-inner">
      <button onclick="switchTab('seller')" id="tab-seller" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 bg-white text-teal-700 shadow shadow-slate-200 tracking-widest">賣家物件</button>
      <button onclick="switchTab('buyer')" id="tab-buyer" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 text-slate-500 hover:text-slate-700 tracking-widest">買家需求</button>
    </div>

    <div id="view-seller" class="block animate-fade-in">
      <div class="flex justify-between items-end mb-4 gap-4">
        <div><h2 class="text-xl font-bold text-slate-800 tracking-wider">我的上架物件</h2><p class="text-xs text-slate-500 mt-1 font-bold">極速預覽與背景同步儲存。</p></div>
        <button onclick="openSellerModal()" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold shadow-md tracking-widest flex items-center text-sm transition"><i class="fa-solid fa-camera-retro mr-2"></i> 上架物件</button>
      </div>
      <div id="seller-items-container" class="space-y-4"></div>
    </div>

    <div id="view-buyer" class="hidden animate-fade-in">
      <div class="flex justify-between items-end mb-4 gap-4">
        <div><h2 class="text-xl font-bold text-slate-800 tracking-wider">我的徵求需求</h2><p class="text-xs text-slate-500 mt-1 font-bold">免填預算，平台幫您找最便宜！</p></div>
        <button onclick="openBuyerModal()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-md tracking-widest flex items-center text-sm transition"><i class="fa-solid fa-bullhorn mr-2"></i> 發佈需求</button>
      </div>
      <div id="buyer-reqs-container" class="space-y-4"></div>
    </div>
  </main>

  <div id="seller-modal" class="fixed inset-0 bg-slate-900/85 backdrop-blur-sm z-50 hidden flex items-center justify-center p-3 opacity-0 transition-opacity">
    <div class="bg-slate-50 w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[95vh]">
      <div class="bg-slate-800 p-4 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
        <h3 class="text-sm font-bold tracking-widest"><i class="fa-solid fa-wand-magic-sparkles text-teal-400 mr-2"></i>AI 賣家智慧上架 <span id="s-draft-badge" class="hidden bg-rose-500 text-white px-2 py-0.5 rounded text-[10px] ml-2">已載入草稿</span></h3>
        <button onclick="closeModal('seller-modal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      
      <div class="p-4 md:p-6 overflow-y-auto hide-scroll flex-grow" id="seller-modal-body">
        <div id="step-camera" class="space-y-4">
          <div class="w-full aspect-[4/3] bg-black rounded-xl overflow-hidden relative camera-frame p-2 flex items-center justify-center">
            <video id="camera-stream" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            <canvas id="camera-canvas" class="hidden"></canvas>
            <div class="z-10 absolute bottom-6 text-center w-full"><span class="bg-black/50 text-white px-4 py-1.5 rounded-full text-xs font-bold">請拍攝物件的</span><h4 id="cam-angle-text" class="text-white text-3xl font-bold mt-2 tracking-widest drop-shadow-lg">上方</h4></div>
          </div>
          <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex space-x-1.5 w-1/2" id="cam-progress"></div>
            <button id="btn-take-photo" onclick="takeRealPhoto()" class="w-1/2 py-3 bg-rose-600 text-white rounded-full font-bold shadow-md tracking-widest"><i class="fa-solid fa-camera mr-2"></i>拍下此視角</button>
          </div>
          <button onclick="skipCameraForDraft()" class="w-full text-xs text-slate-500 font-bold underline mt-2 text-center hidden" id="btn-skip-cam">直接接續填寫上次草稿</button>
        </div>

        <div id="step-seller-form" class="hidden space-y-5 pb-4" oninput="saveDraft('seller')">
          <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h4 class="text-sm font-bold text-teal-700 flex items-center border-b pb-2">物件基本資料</h4>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="block text-[11px] font-bold text-slate-500 mb-1">類別</label><input type="text" id="s-cat" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold"></div>
              <div><label class="block text-[11px] font-bold text-slate-500 mb-1">項目</label><input type="text" id="s-item" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold"></div>
              <div class="col-span-2"><label class="block text-[11px] font-bold text-slate-500 mb-1">標題</label><input type="text" id="s-name" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold"></div>
              <div class="col-span-2"><label class="block text-[11px] font-bold text-slate-500 mb-1">色系</label><input type="text" id="s-color" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-bold"></div>
              <div class="col-span-2 flex gap-2"><input type="number" id="s-w" placeholder="寬" class="w-1/3 p-3 bg-slate-50 border rounded-xl font-mono text-center font-bold"><input type="number" id="s-d" placeholder="深" class="w-1/3 p-3 bg-slate-50 border rounded-xl font-mono text-center font-bold"><input type="number" id="s-h" placeholder="高" class="w-1/3 p-3 bg-slate-50 border rounded-xl font-mono text-center font-bold"></div>
            </div>
          </div>
          <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h4 class="text-sm font-bold text-rose-500 flex items-center border-b pb-2">精確所在地</h4>
            <div class="grid grid-cols-2 gap-3">
              <div><input type="text" id="s-city" placeholder="縣市*" value="台北市" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div><input type="text" id="s-dist" placeholder="鄉鎮區*" value="信義區" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div class="col-span-2"><input type="text" id="s-road" placeholder="路段*" value="信義路五段" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div><input type="text" id="s-street" placeholder="街道" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div><input type="text" id="s-alley" placeholder="巷弄" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div><input type="text" id="s-no" placeholder="號碼*" value="7號" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
              <div><input type="number" id="s-floor" placeholder="樓層*" value="1" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold"></div>
            </div>
          </div>
          <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <h4 class="text-sm font-bold text-teal-600 flex items-center border-b pb-2">時間與售價</h4>
            <input type="date" id="s-deadline" class="w-full p-3 bg-rose-50 border border-rose-200 rounded-xl font-bold">
            <input type="number" id="s-price" min="100" step="100" placeholder="售價(100的倍數)" class="w-full p-3 bg-teal-50 border border-teal-200 rounded-xl text-lg font-mono font-bold text-teal-900 text-center">
            <div class="grid grid-cols-2 gap-3 pt-2">
              <select id="s-carry" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold text-slate-600"><option value="可以幫忙搬下樓">✅ 可幫下樓</option><option value="此物不必搬下樓">➖ 不必下樓</option></select>
              <select id="s-disasm" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold text-slate-600"><option value="可以幫忙拆卸">🛠️ 可幫拆卸</option><option value="此物不必拆卸" selected>➖ 不必拆卸</option></select>
            </div>
          </div>
          <button id="btn-submit-seller" onclick="submitSellerForm()" class="w-full py-4 mt-2 bg-teal-700 text-white rounded-xl font-bold tracking-widest shadow-lg transition transform active:scale-95">確認發佈上架 (背景即時同步)</button>
        </div>
      </div>
    </div>
  </div>

  <div id="buyer-modal" class="fixed inset-0 bg-slate-900/85 backdrop-blur-sm z-50 hidden flex items-center justify-center p-3 opacity-0 transition-opacity">
    <div class="bg-slate-50 w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[95vh]">
      <div class="bg-indigo-900 p-4 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
        <h3 class="text-sm font-bold tracking-widest"><i class="fa-solid fa-bullhorn text-indigo-400 mr-2"></i>建立買家需求 <span id="b-draft-badge" class="hidden bg-rose-500 text-white px-2 py-0.5 rounded text-[10px] ml-2">已載入草稿</span></h3>
        <button onclick="closeModal('buyer-modal')" class="text-indigo-300 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>

      <div class="p-4 md:p-6 overflow-y-auto hide-scroll flex-grow space-y-5 pb-8" oninput="saveDraft('buyer')">
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
          <h4 class="text-sm font-bold text-indigo-700 border-b border-slate-100 pb-2">您想尋找什麼？</h4>
          <div class="grid grid-cols-2 gap-3">
            <div><input type="text" id="b-cat" placeholder="類別(例:沙發)" class="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-slate-700"></div>
            <div><input type="text" id="b-item" placeholder="項目(例:雙人沙發)" class="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-slate-700"></div>
            <div class="col-span-2"><input type="text" id="b-color" placeholder="期望色系(例:木紋)" class="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-slate-700"></div>
            <div class="col-span-2 flex gap-2"><input type="number" id="b-w" placeholder="最寬" class="w-1/3 p-3 bg-slate-50 border rounded-xl text-center font-mono font-bold"><input type="number" id="b-d" placeholder="最深" class="w-1/3 p-3 bg-slate-50 border rounded-xl text-center font-mono font-bold"><input type="number" id="b-h" placeholder="最高" class="w-1/3 p-3 bg-slate-50 border rounded-xl text-center font-mono font-bold"></div>
          </div>
        </div>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
          <h4 class="text-sm font-bold text-slate-700 flex items-center border-b border-slate-100 pb-2">精確徵求地與時間</h4>
          <div class="grid grid-cols-2 gap-3 mb-2">
            <div><input type="text" id="b-city" value="台北市" placeholder="縣市*" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div><input type="text" id="b-dist" value="大安區" placeholder="鄉鎮區*" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div class="col-span-2"><input type="text" id="b-road" placeholder="路段*" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div><input type="text" id="b-street" placeholder="街道" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div><input type="text" id="b-alley" placeholder="巷弄" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div><input type="text" id="b-no" placeholder="號碼*" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></div>
            <div><input type="number" id="b-floor" value="1" placeholder="樓層*" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold"></div>
          </div>
          <input type="date" id="b-deadline" class="w-full p-3 bg-rose-50 border border-rose-200 rounded-xl font-bold text-sm">
        </div>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
          <button id="btn-ai-estimate" onclick="estimateSavings()" class="w-full py-3 bg-green-50 text-green-700 font-bold rounded-xl border border-green-200 hover:bg-green-100 transition"><i class="fa-solid fa-calculator mr-2"></i>AI 估算購買新品約需多少錢</button>
          <div id="estimate-result" class="hidden text-center bg-green-100 p-4 rounded-xl border border-green-300">
            <p class="text-xs text-green-800 font-bold">在我們平台成交，您預估可省下：</p>
            <p class="text-2xl font-black text-green-700 mt-1"><span id="saved-amount"></span> <span class="text-sm font-bold">元</span></p>
          </div>
        </div>

        <button id="btn-submit-req" onclick="submitRequirement()" class="w-full py-4 bg-indigo-600 text-white rounded-xl text-base font-bold shadow-xl tracking-widest transition transform active:scale-95">極速發佈買家需求</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 🔗 核心設定：請填寫你最新部署的 GAS 網址
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwtBHLxEmAolz6TxMJw43fUmugQokKA6RncGXf9W3A0dUFx5XI2YSZOPsAOR7PFw1NW-g/exec";

    const currentUser = { email: "alwayslucky2hand@gmail.com", memberCode: "alwayslucky2hand" };
    document.getElementById('current-user-info').innerText = currentUser.memberCode;

    // 啟動時從 LocalStorage 撈取曾建立過的清單 (真正的樂觀 UI 狀態保持)
    let sellerItems = JSON.parse(localStorage.getItem('local_seller_items') || "[]"); 
    let buyerReqs = JSON.parse(localStorage.getItem('local_buyer_reqs') || "[]");
    
    const angles = ['上方', '下方', '左側', '右側', '前方', '後方', '合照'];
    let currentAngleIndex = 0; let mockUploadedPhotos = []; let videoStream = null;

    async function callBackendAPI(action, data) {
      if (GAS_API_URL.includes("請把剛剛部署")) throw new Error("Missing API URL");
      const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
      return await res.json();
    }

    function showToast(msg, type = 'info') {
      const c = document.getElementById('toast-container'); const t = document.createElement('div');
      t.className = `px-5 py-3.5 rounded-xl shadow-xl transition-all duration-300 font-bold text-sm text-center text-white transform -translate-y-10 opacity-0 ${type==='success'?'bg-teal-600':type==='error'?'bg-rose-600':'bg-slate-800'}`;
      t.innerText = msg; c.appendChild(t);
      requestAnimationFrame(() => { t.classList.remove('-translate-y-10', 'opacity-0'); });
      setTimeout(() => { t.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    // --- Tab 切換與渲染 ---
    function switchTab(tab) {
      document.getElementById('view-seller').classList.toggle('hidden', tab !== 'seller');
      document.getElementById('view-buyer').classList.toggle('hidden', tab !== 'buyer');
      const ts = document.getElementById('tab-seller'); const tb = document.getElementById('tab-buyer');
      if(tab === 'seller') {
        ts.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition bg-white text-teal-700 shadow";
        tb.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition text-slate-500";
      } else {
        tb.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition bg-white text-indigo-700 shadow";
        ts.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition text-slate-500";
      }
    }

    function renderSellerItems() {
      const c = document.getElementById('seller-items-container'); c.innerHTML = '';
      if(sellerItems.length === 0) return c.innerHTML = '<p class="text-center text-slate-400 font-bold mt-10">尚無上架物件</p>';
      sellerItems.forEach(i => {
        let urls = i.photoUrlsString ? i.photoUrlsString.split(',') : [];
        let imgs = urls.length ? urls.map(u => `<img src="${u}" class="h-20 w-28 flex-shrink-0 object-cover rounded shadow-sm">`).join('') : '<div class="h-20 w-full flex items-center justify-center bg-slate-100 rounded text-xs text-slate-400 font-bold">照片處理中...</div>';
        c.insertAdjacentHTML('beforeend', `<div class="bg-white rounded-xl shadow-sm border border-l-4 border-l-teal-500 p-4"><div class="flex justify-between items-center mb-1"><span class="text-[10px] font-mono text-slate-400">${i.id}</span><span class="bg-teal-50 text-teal-700 px-2 rounded text-[10px] font-bold">上架中</span></div><h3 class="font-bold text-sm">${i.name} <span class="text-xs text-slate-500">($${i.price})</span></h3><p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${i.city}${i.district}</p><div class="flex space-x-2 overflow-x-auto hide-scroll mt-3">${imgs}</div></div>`);
      });
    }

    function renderBuyerReqs() {
      const c = document.getElementById('buyer-reqs-container'); c.innerHTML = '';
      if(buyerReqs.length === 0) return c.innerHTML = '<p class="text-center text-slate-400 font-bold mt-10">尚無發佈需求</p>';
      buyerReqs.forEach(r => {
        c.insertAdjacentHTML('beforeend', `<div class="bg-white rounded-xl shadow-sm border border-l-4 border-l-indigo-500 p-4"><div class="flex justify-between items-center mb-1"><span class="text-[10px] font-mono text-slate-400">${r.id}</span><span class="bg-indigo-50 text-indigo-700 px-2 rounded text-[10px] font-bold">徵求中</span></div><h3 class="font-bold text-sm">徵求：${r.itemType} <span class="text-xs text-slate-500">(${r.color})</span></h3><p class="text-[10px] font-bold text-green-600 mt-1"><i class="fa-solid fa-leaf mr-1"></i>預計省下：$${r.savedCost}</p><p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${r.city}${r.district}</p></div>`);
      });
    }

    // ==========================================
    // 💾 LocalStorage 暫存功能 (防呆機制核心)
    // ==========================================
    const SELLER_KEYS = ['s-cat','s-item','s-name','s-color','s-w','s-d','s-h','s-city','s-dist','s-road','s-street','s-alley','s-no','s-floor','s-deadline','s-price','s-carry','s-disasm'];
    const BUYER_KEYS = ['b-cat','b-item','b-color','b-w','b-d','b-h','b-city','b-dist','b-road','b-street','b-alley','b-no','b-floor','b-deadline'];

    function saveDraft(type) {
      const keys = type === 'seller' ? SELLER_KEYS : BUYER_KEYS;
      let draft = {};
      keys.forEach(k => draft[k] = document.getElementById(k).value);
      localStorage.setItem(`draft_${type}`, JSON.stringify(draft));
    }

    function loadDraft(type) {
      let draftStr = localStorage.getItem(`draft_${type}`);
      if(!draftStr) return false;
      let draft = JSON.parse(draftStr);
      let hasData = false;
      Object.keys(draft).forEach(k => {
        if(draft[k] && document.getElementById(k)) {
          document.getElementById(k).value = draft[k];
          hasData = true;
        }
      });
      return hasData;
    }

    function clearDraft(type) { localStorage.removeItem(`draft_${type}`); }

    // --- 彈跳視窗控制 ---
    function closeModal(id) {
      document.getElementById(id).classList.add('opacity-0');
      setTimeout(() => document.getElementById(id).classList.add('hidden'), 300);
      if(id === 'seller-modal') stopCamera();
    }

    // ==========================================
    // 買家功能：樂觀 UI 寫入
    // ==========================================
    function openBuyerModal() {
      document.getElementById('buyer-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('buyer-modal').classList.remove('opacity-0'), 10);
      
      let hasDraft = loadDraft('buyer');
      document.getElementById('b-draft-badge').classList.toggle('hidden', !hasDraft);
      if(!hasDraft) {
        const d = new Date(); d.setDate(d.getDate() + 14); document.getElementById('b-deadline').value = d.toISOString().split('T')[0];
      }
    }

    async function estimateSavings() {
      const cat = document.getElementById('b-cat').value; const item = document.getElementById('b-item').value;
      if(!cat || !item) return showToast("請先填寫目標類別與項目", "error");
      const btn = document.getElementById('btn-ai-estimate');
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>AI 查詢中...`; btn.disabled = true;
      try {
        const res = await callBackendAPI('estimateSavings', { category: cat, itemType: item });
        if(res.status === 'success') {
          document.getElementById('saved-amount').innerText = res.data.savedCost;
          document.getElementById('estimate-result').classList.remove('hidden');
        }
      } catch(e) { showToast("連線異常", "error"); }
      btn.innerHTML = `<i class="fa-solid fa-calculator mr-2"></i>AI 估算購買新品約需多少錢`; btn.disabled = false;
    }

    function submitRequirement() {
      if(!document.getElementById('b-deadline').value) return showToast("請填寫需求死線", "error");

      // 1. 建立物件
      const newReq = {
        id: `REQ-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`, buyerEmail: currentUser.email, buyerMemberCode: currentUser.memberCode,
        category: document.getElementById('b-cat').value, itemType: document.getElementById('b-item').value, color: document.getElementById('b-color').value,
        maxWidth: document.getElementById('b-w').value, maxDepth: document.getElementById('b-d').value, maxHeight: document.getElementById('b-h').value,
        city: document.getElementById('b-city').value, district: document.getElementById('b-dist').value, road: document.getElementById('b-road').value, street: document.getElementById('b-street').value, alley: document.getElementById('b-alley').value, number: document.getElementById('b-no').value, floor: document.getElementById('b-floor').value,
        deadline: document.getElementById('b-deadline').value, savedCost: document.getElementById('saved-amount').innerText || 0, status: "Active"
      };

      // 2. 樂觀 UI 渲染：不管網路直接顯示！
      buyerReqs.unshift(newReq); 
      localStorage.setItem('local_buyer_reqs', JSON.stringify(buyerReqs)); // 存入本機避免重整消失
      renderBuyerReqs();
      clearDraft('buyer');
      closeModal('buyer-modal');
      showToast("🚀 需求已光速建立，背景同步中...", "success");

      // 3. 背景默默發送 API
      callBackendAPI('saveRequirement', newReq).catch(e => console.error("背景寫入失敗", e));
    }

    // ==========================================
    // 賣家功能：樂觀 UI 寫入
    // ==========================================
    async function openSellerModal() {
      currentAngleIndex = 0; mockUploadedPhotos = []; document.getElementById('cam-angle-text').innerText = angles[0];
      
      let hasDraft = !!localStorage.getItem('draft_seller');
      document.getElementById('btn-skip-cam').classList.toggle('hidden', !hasDraft);
      document.getElementById('s-draft-badge').classList.toggle('hidden', !hasDraft);

      document.getElementById('step-camera').classList.remove('hidden'); document.getElementById('step-seller-form').classList.add('hidden');
      document.getElementById('seller-modal').classList.remove('hidden'); setTimeout(() => document.getElementById('seller-modal').classList.remove('opacity-0'), 10);
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('camera-stream').srcObject = videoStream;
      } catch(e) { showToast("相機啟動失敗", "error"); }
    }
    function stopCamera() { if(videoStream) videoStream.getTracks().forEach(t => t.stop()); }

    function skipCameraForDraft() {
      stopCamera();
      loadDraft('seller');
      document.getElementById('step-camera').classList.add('hidden'); 
      document.getElementById('step-seller-form').classList.remove('hidden');
    }

    async function takeRealPhoto() {
      const v = document.getElementById('camera-stream'); const c = document.getElementById('camera-canvas');
      c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0);
      mockUploadedPhotos.push(c.toDataURL('image/jpeg', 0.6));

      if(currentAngleIndex < 6) {
        currentAngleIndex++; document.getElementById('cam-angle-text').innerText = angles[currentAngleIndex];
        document.getElementById('cam-progress').innerHTML = angles.map((_,i) => `<div class="h-2 w-full rounded-full ${i<=currentAngleIndex?'bg-teal-500':'bg-slate-200'}"></div>`).join('');
      } else {
        stopCamera(); const btn = document.getElementById('btn-take-photo'); btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>AI 解析中...`; btn.disabled = true;
        try {
          const res = await callBackendAPI('analyzeImages', { photos: mockUploadedPhotos });
          if (res.status === 'success') {
            document.getElementById('s-cat').value = res.data.category || ''; document.getElementById('s-item').value = res.data.itemType || ''; document.getElementById('s-name').value = res.data.name || ''; document.getElementById('s-color').value = res.data.color || ''; document.getElementById('s-w').value = res.data.width || ''; document.getElementById('s-d').value = res.data.depth || ''; document.getElementById('s-h').value = res.data.height || '';
            document.getElementById('step-camera').classList.add('hidden'); document.getElementById('step-seller-form').classList.remove('hidden');
            const d = new Date(); d.setDate(d.getDate() + 14); document.getElementById('s-deadline').value = d.toISOString().split('T')[0];
            saveDraft('seller'); // AI 填完先幫存檔
          } else showToast("AI 解析失敗", "error");
        } catch(e) { showToast("網路異常，請手動輸入", "error"); document.getElementById('step-camera').classList.add('hidden'); document.getElementById('step-seller-form').classList.remove('hidden'); }
        btn.innerHTML = "拍下此視角"; btn.disabled = false;
      }
    }

    function submitSellerForm() {
      const p = parseInt(document.getElementById('s-price').value);
      if(p < 100 || p > 2000 || p % 100 !== 0) return showToast("金額須在 100~2000 且為 100 倍數", "error");

      // 1. 建立物件
      const newItem = {
        id: `ITM-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`, sellerEmail: currentUser.email, sellerMemberCode: currentUser.memberCode,
        category: document.getElementById('s-cat').value, itemType: document.getElementById('s-item').value, name: document.getElementById('s-name').value, color: document.getElementById('s-color').value,
        width: document.getElementById('s-w').value, depth: document.getElementById('s-d').value, height: document.getElementById('s-h').value,
        city: document.getElementById('s-city').value, district: document.getElementById('s-dist').value, road: document.getElementById('s-road').value, street: document.getElementById('s-street').value, alley: document.getElementById('s-alley').value, number: document.getElementById('s-no').value, floor: document.getElementById('s-floor').value,
        deadline: document.getElementById('s-deadline').value, timeSlots: "多時段", price: p, wasteFee: 1500, carry: document.getElementById('s-carry').value, disassemble: document.getElementById('s-disasm').value, status: "Active", photosBase64: mockUploadedPhotos, photoUrlsString: ""
      };

      // 2. 樂觀 UI 渲染：不管網路直接顯示！
      sellerItems.unshift(newItem);
      localStorage.setItem('local_seller_items', JSON.stringify(sellerItems));
      renderSellerItems();
      clearDraft('seller');
      closeModal('seller-modal');
      showToast("🚀 物件已光速上架，背景上傳圖片中...", "success");

      // 3. 背景默默傳送大檔照片到 GAS
      callBackendAPI('saveListing', newItem).then(res => {
        // 取得直連圖片網址後更新本地狀態
        if(res.photoUrls) {
          sellerItems[0].photoUrlsString = res.photoUrls;
          localStorage.setItem('local_seller_items', JSON.stringify(sellerItems));
          renderSellerItems();
        }
      }).catch(e => console.error("背景寫入失敗", e));
    }

    // 初始化渲染
    switchTab('seller');
  </script>
</body>
</html>
